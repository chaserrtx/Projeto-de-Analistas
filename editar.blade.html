<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="crear-perfil-page d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar">
            <h2><svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
</svg>PoliData</h2>
                <div class="menu">
                    <button type="button" class="btn btn-outline-secondary"><a href="">Início</a></button>
                    <button type="button" class="btn btn-outline-secondary"><a href="">Usuários</a></button>
                    <button type="button" class="btn btn-outline-secondary"><a href="">Perfis</a></button>
                    <button type="button" class="btn btn-outline-secondary"><a href="">Relatórios</a></button>
                </div>
            </nav>
           </header>
		   <main class="container my-5 flex-grow-1">
				<div class="row justify-content-center">
					<div class="col-lg-8">
						<div class="card bg-dark text-light shadow-lg border-0">
							<div class="card-header text-center py-4">
								<h1 class="mb-0">Cadastrar Perfil</h1>
							</div>
							<div class="card-body p-4">
								<form>
									<div class="mb-4">
										<label class="form-label">Usuário</label>
										<select class="form-select">
											<option selected>Selecione um usuário</option>
											<option>Gabriela Avila</option>
											<option>Gonzalo Rodriguez</option>
											<option>Ana Da Silva</option>
											<option>Ana Souza</option>
										</select>
									</div>		
									<div class="mb-4">
										<label class="form-label">Telefone</label>
										<input type="text" class="form-control" placeholder="(11) 99999-9999">										
									</div>		
									<div class="mb-4">
										<label class="form-label">Biografia</label>
									<textarea class="form-control" rows="5" placeholder="Descreva a atuação política ou profissional do usuário."></textarea>
									</div>	
									<div class="d-flex gap-2">
										<button type="submit" class="btn btn-primary flex-fill">Salvar Perfil</button>
										<a href="perfis.html" class="btn btn-outline-light">Voltar</a>
									</div>				
								</form>
							</div>						
						</div>
					</div>								
				</div>
		   
		   </main>
	<footer class="footer-dark mt-auto">
			<div class="container text-center">
				<small>
					Construção de Páginas Web III <br> Gabriela Avila
				</small>
			</div>
			</footer>
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
